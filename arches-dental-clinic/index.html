<!doctype html>

    <!-- Primary SEO -->

      name="description"
      content="Arches Dental Clinic offers general dentistry, orthodontics, and oral surgery for patients of all ages. Modern technology, gentle care, and a warm, comfortable clinic. Call us today."

    <!-- Open Graph -->

    <meta property="og:site_name" content="Arches Dental Clinic" />
    <meta property="og:title" content="Arches Dental Clinic | Modern, Compassionate Dental Care" />

      property="og:description"
      content="Modern, compassionate dental care for patients of all ages using advanced technology in a comfortable environment."

    <meta property="og:url" content="https://www.archesdental.com/" />
    <meta property="og:image" content="https://www.archesdental.com/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Arches Dental Clinic | Modern, Compassionate Dental Care" />
    <meta
      name="twitter:description"
      content="Modern, compassionate dental care for patients of all ages using advanced technology in a comfortable environment."
    />
    <meta name="twitter:image" content="https://www.archesdental.com/og-image.jpg" />

        "address": {

          "postalCode": "6111",
          "addressCountry": "PH"
        },

          { "@type": "OpeningHoursSpecification", "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"], "opens": "09:30", "closes": "17:00" }
        ],

    event.preventDefault();
});
